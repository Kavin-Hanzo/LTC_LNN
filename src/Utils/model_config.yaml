# ==========================================
# UNIFIED CONFIGURATION KEYS
# ==========================================

system:
  device: "cpu"               
  dtype: "float32"
  random_seed: 42

data:
  ticker: "GOOG"             # Main config uses: tickers: ["AAPL", "GOOGL"]
  start_date: "2011-01-01"
  end_date: "2025-12-31"
  interval: "1d"               
  train_split: 0.8             
  sequence_length: 30
  prediction_horizon: 1      # for long-run use 21  
  target_column: "Close"
  use_boruta: True             # Toggle to False for Baseline vs Hybrid comparison

model:
  architecture: "LNN"          # Main config uses: architectures: ["RNN", "LSTM", "LNN", "GRU"]
  hidden_size: 128
  num_layers: 1               
  dropout_rate: 0.1
  ltc_params:                  # Ignored by RNN/LSTM/GRU builds
    tau_constant: 1.0          
    ode_unfolds: 6             

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  optimizer: "Adam"
  loss_function: "MSELoss"    # try HuberLoss for long-run 
  grad_clip: 1.0               

logging:
  save_dir: "./experiments/single_run/15_lnn"
  track_metrics: ["MSE", "RMSE", "MAE", "R2", "MAPE", "sMAPE"]