# ==========================================
# DATA CONFIGURATION
# ==========================================
data_config:
  tickers: ["AAPL", "GOOGL", "BLK", "JPM", "IBM"]
  
  # Research Paper: Three sets of data with specific intervals
  historical_sets:
    - name: "Set_A_Long_Term"
      start: "2015-01-01"
      end: "2025-12-31"
      interval: "1d"        # Standard daily analysis
    - name: "Set_B_Volatile"
      start: "2020-01-01"
      end: "2025-12-31"
      interval: "1d"        # Higher resolution for volatility
    - name: "Set_C_Recent"
      start: "2026-01-01"
      end: "2026-01-31"
      interval: "1h"

  prediction_horizon: 1     # Next step prediction
  sequence_length: 30       # Lookback window
  target_column: "Close"
  scaling_method: "MinMaxScaler"
  train_split_ratio: 0.8
  
  feature_selection:
    use_boruta: true
    rf_max_depth: 5
    random_state: 42

# ==========================================
# MODEL CONFIGURATION
# ==========================================
model_config:
  architecture: "RNN"  # Choice: ['RNN', 'LSTM', 'LNN']
  version: "v1.1_Interval_Aware"
  
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  
  # Liquid Neural Network Parameters
  lnn_params:
    time_constant_tau: 1.0  
    use_euler_solver: true
    dt: 0.1                 
  
  training:
    epochs: 50
    batch_size: 64
    learning_rate: 0.001
    optimizer: "Adam"
    criterion: "MSELoss"
    device_id: 0 

# ==========================================
# SYSTEM & LOGGING
# ==========================================
system:
  dtype: "float32" 
  device: "cuda"

logging:
  save_dir: "./experiments"
  save_plots: true
  metrics: ["R2", "MSE", "MAE", "RMSE", "MAPE", "sMAPE"]