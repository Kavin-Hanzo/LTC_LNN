data:
  ticker: "AAPL"
  period: "5y"               # yfinance period string
  window_size: 30            # W: lookback days fed to model as sequence
  features:
    - "Open"
    - "High"
    - "Low"
    - "Close"
    - "Volume"
    - "RSI"
    - "MACD"
    - "SMA_20"

training:
  forecast_horizon: 1        # single-step autoregressive — predictor rolls forward N times at inference
  batch_size: 32
  epochs: 100
  lr: 0.001
  early_stopping_patience: 10
  val_split: 0.0
  test_split: 0.2
  seed: 42

boruta:
  enabled: false             # true -> run Boruta after scaling, drop unimportant features
  n_estimators: 100          # RandomForest trees used by Boruta
  max_iter: 100              # max Boruta iterations
  perc: 100                  # threshold percentile (100 = strict, lower = more lenient)
  alpha: 0.05                # p-value threshold for feature acceptance

models:
  hidden_size: 64
  num_layers: 2              # used by RNN, LSTM, GRU
  dropout: 0.2
  lnn:
    tau_constant: 1.0
    ode_unfolds: 6
    dt: 0.1

artifacts:
  base_dir: "artifacts"      # artifacts/{arch}/model.pth, scaler.pkl, meta.json
  best_dir: "artifacts/best"