data:
  ticker: "AAPL"
  period: "5y"               # yfinance period string
  window_size: 30            # W: lookback days fed to model as sequence
  features:
    - "Close"
    - "Volume"
    - "RSI"
    - "MACD"
    - "SMA_20"

training:
  forecast_horizon: 30       # N: default days to forecast (overridable via CLI/API)
  batch_size: 32
  epochs: 50
  lr: 0.001
  early_stopping_patience: 10
  val_split: 0.15
  test_split: 0.15
  seed: 42

models:
  hidden_size: 64
  num_layers: 2              # used by RNN, LSTM, GRU
  dropout: 0.2
  lnn:
    tau_constant: 1.0
    ode_unfolds: 6
    dt: 0.1

artifacts:
  base_dir: "artifacts"      # artifacts/{arch}/model.pth, scaler.pkl, meta.json
  best_dir: "artifacts/best"
